_target_: verl.workers.config.MuonOptimizerConfig

optimizer: MuonWithAdamW
optimizer_impl: verl.utils.muon

lr: 2e-3

lr_warmup_steps_ratio: 0.0
total_training_steps: -1
weight_decay: 0.01
lr_warmup_steps: -1
betas: [0.9, 0.999]
clip_grad: 1.0

min_lr_ratio: 0.0
num_cycles: 0.5
lr_scheduler_type: constant
zero_indexed_step: true
warmup_style: null
override_optimizer_config: null

momentum: 0.95
ns_steps: 5
ns_eps: 1e-7
rms_scale: 0.2
adamw_lr: null
adamw_betas: [0.9, 0.999]
adamw_eps: 1e-8
muon_param_filter: hidden
