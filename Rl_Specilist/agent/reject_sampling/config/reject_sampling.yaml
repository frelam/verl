hydra:
  searchpath:
    - file://verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

# Data config: prompts extracted by extract_prompts.py
data:
  max_prompt_length: 4096
  max_response_length: 8192
  train_batch_size: 64
  return_raw_chat: True
  filter_overlong_prompts: True
  truncation: error

# Actor + Rollout config
# Key: lr=0 so actor weights are never updated; this is rollout-only.
actor_rollout_ref:
  hybrid_engine: False
  rollout:
    name: vllm
    mode: async
    multi_turn:
      enable: True
      max_assistant_turns: 15          # Agent tasks need more turns than math
      max_parallel_calls: 1
      max_tool_response_length: 2048
      tool_response_truncate_side: middle
      format: hermes
    n: 8                               # 8 samples per prompt for reject sampling
    temperature: 0.7                   # Moderate temperature for diversity
    top_p: 0.95
    gpu_memory_utilization: 0.85
    over_sample_rate: 0.1
    multi_stage_wake_up: True
  model:
    path: Qwen/Qwen3-4B
    use_remove_padding: True
    enable_gradient_checkpointing: True
  actor:
    optim:
      lr: 0                            # lr=0: rollout only, no weight update
      weight_decay: 0.1
    use_kl_loss: False                 # No KL needed for pure rollout
    ppo_mini_batch_size: 64
    ppo_micro_batch_size_per_gpu: 8
    use_dynamic_bsz: True
    grad_clip: 1
    fsdp_config:
      param_offload: True              # Offload since we don't train
      optimizer_offload: True
  ref:
    log_prob_micro_batch_size_per_gpu: 8
    fsdp_config:
      param_offload: True

# Algorithm: GRPO (but with lr=0, advantage is computed but not applied)
algorithm:
  adv_estimator: grpo
  use_kl_in_reward: False
  gamma: 1.0
  lam: 1.0

# Reward: DeepSeek API judge + trajectory collection
reward:
  reward_manager:
    source: register
    name: naive
  custom_reward_function:
    path: Rl_Specilist.agent.reject_sampling.reward.judge_reward
    name: compute_score

# Trainer: single pass, no checkpoint saving
trainer:
  critic_warmup: 0
  logger: '["console","wandb"]'
  n_gpus_per_node: 8
  nnodes: 1
  total_epochs: 1                     # One pass over the data
  save_freq: 999                      # Never save checkpoints
  test_freq: 999                      # No validation
  val_before_train: False
