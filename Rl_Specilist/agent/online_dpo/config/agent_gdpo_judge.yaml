# Agent Online GDPO with Multi-Dimensional LLM Judge
#
# This config extends agent_dpo_judge.yaml for GDPO, which normalizes
# each reward dimension independently before aggregation.
#
# Key differences from standard DPO:
#   - Uses GDPO advantage estimator (decoupled dimension normalization)
#   - Judge returns per-dimension scores (accuracy, format, planning, etc.)
#   - gdpo_reward_keys tell GDPO which dimensions to use

hydra:
  searchpath:
    - file://verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

# ---------------------------------------------------------------------------
# Data
# ---------------------------------------------------------------------------
data:
  max_prompt_length: 4096
  max_response_length: 8192
  train_batch_size: 32
  return_raw_chat: True
  filter_overlong_prompts: True
  truncation: error

# ---------------------------------------------------------------------------
# Actor + Rollout + Ref
# ---------------------------------------------------------------------------
actor_rollout_ref:
  hybrid_engine: True

  rollout:
    name: vllm
    mode: async
    multi_turn:
      enable: True
      max_assistant_turns: 10
      max_user_turns: 10
      max_parallel_calls: 1
      max_tool_response_length: 2048
      tool_response_truncate_side: middle
      format: hermes
    n: 4
    temperature: 0.7
    top_p: 0.95
    gpu_memory_utilization: 0.85
    over_sample_rate: 0.1
    multi_stage_wake_up: True

  model:
    path: Qwen/Qwen3-4B
    use_remove_padding: True
    enable_gradient_checkpointing: True

  actor:
    optim:
      lr: 1e-6
      weight_decay: 0.1
    use_kl_loss: False
    policy_loss:
      loss_mode: vanilla          # GDPO uses standard PPO loss with gdpo adv
    ppo_mini_batch_size: 32
    ppo_micro_batch_size_per_gpu: 4
    use_dynamic_bsz: True
    grad_clip: 1.0
    fsdp_config:
      param_offload: False
      optimizer_offload: False

  ref:
    log_prob_micro_batch_size_per_gpu: 8
    fsdp_config:
      param_offload: True

# ---------------------------------------------------------------------------
# Critic: disabled
# ---------------------------------------------------------------------------
critic:
  enable: False

# ---------------------------------------------------------------------------
# Algorithm: GDPO mode with multi-dimensional judge
# ---------------------------------------------------------------------------
algorithm:
  adv_estimator: gdpo             # GDPO: decoupled per-dimension normalization
  use_kl_in_reward: False
  gamma: 1.0
  lam: 1.0
  # GDPO per-dimension reward keys (must match what the judge returns)
  gdpo_reward_keys:
    - accuracy_reward
    - format_reward
    - planning_reward
    - tool_accuracy_reward
    - efficiency_reward
  # Optional: per-dimension weights (can be tuned to emphasize certain aspects)
  gdpo_reward_weights:
    - 0.3   # accuracy_reward
    - 0.2   # format_reward
    - 0.2   # planning_reward
    - 0.1   # tool_accuracy_reward
    - 0.2   # efficiency_reward

# ---------------------------------------------------------------------------
# Reward: BatchRewardManager + LLM Judge (GDPO mode)
# ---------------------------------------------------------------------------
reward:
  reward_manager:
    source: register
    name: llm_judge               # Batch-level LLM judge scoring (GDPO mode)
  custom_reward_function:
    path: verl.utils.reward_score.llm_judge_reward
    name: compute_score
  use_batch_judge: True

# ---------------------------------------------------------------------------
# Trainer
# ---------------------------------------------------------------------------
trainer:
  critic_warmup: 0
  logger: '["console","wandb"]'
  n_gpus_per_node: 8
  nnodes: 1
  total_epochs: 15
  save_freq: 20
  test_freq: 10
  val_before_train: True
