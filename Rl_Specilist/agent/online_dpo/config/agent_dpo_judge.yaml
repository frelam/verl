# Agent Online DPO with configurable LLM Judge
#
# This config enables:
# 1. Multi-turn agent rollout (ToolAgentLoop) with controlled max turns
# 2. Batch-level LLM judge scoring (relative or absolute, configurable criteria)
# 3. Online DPO training with best-vs-worst pairing
#
# Key design:
#   - reward_manager.name=batch: passes ALL trajectories to the judge at once
#   - llm_judge_reward.py: sends batch to judge API, gets relative scores back
#   - algorithm.use_dpo=True: builds best/worst pairs from judge scores
#   - actor.policy_loss.loss_mode=dpo: uses DPO loss function
#
# Judge configuration is controlled via environment variables (see below)
# or via extra_info in the dataset.

hydra:
  searchpath:
    - file://verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

# ---------------------------------------------------------------------------
# Data
# ---------------------------------------------------------------------------
data:
  max_prompt_length: 4096
  max_response_length: 8192
  train_batch_size: 32            # 32 prompts per step, n=4 -> 128 trajectories
  return_raw_chat: True
  filter_overlong_prompts: True
  truncation: error

# ---------------------------------------------------------------------------
# Actor + Rollout + Ref
# ---------------------------------------------------------------------------
actor_rollout_ref:
  hybrid_engine: True

  rollout:
    name: vllm
    mode: async
    multi_turn:
      enable: True
      max_assistant_turns: 10     # Max model generation turns per trajectory
      max_user_turns: 10          # Max tool execution turns per trajectory
      max_parallel_calls: 1
      max_tool_response_length: 2048
      tool_response_truncate_side: middle
      format: hermes
    n: 4                          # Samples per prompt (need >=2 for best-vs-worst)
    temperature: 0.7
    top_p: 0.95
    gpu_memory_utilization: 0.85
    over_sample_rate: 0.1
    multi_stage_wake_up: True

  model:
    path: Qwen/Qwen3-4B
    use_remove_padding: True
    enable_gradient_checkpointing: True

  actor:
    optim:
      lr: 1e-6
      weight_decay: 0.1
    use_kl_loss: False            # DPO loss already has ref term
    policy_loss:
      loss_mode: dpo
      dpo_beta: 0.1               # DPO temperature (higher = more conservative)
    ppo_mini_batch_size: 32
    ppo_micro_batch_size_per_gpu: 4
    use_dynamic_bsz: True
    grad_clip: 1.0
    fsdp_config:
      param_offload: False
      optimizer_offload: False

  ref:
    log_prob_micro_batch_size_per_gpu: 8
    fsdp_config:
      param_offload: True

# ---------------------------------------------------------------------------
# Critic: disabled for DPO
# ---------------------------------------------------------------------------
critic:
  enable: False

# ---------------------------------------------------------------------------
# Algorithm: DPO mode
# ---------------------------------------------------------------------------
algorithm:
  adv_estimator: grpo             # Placeholder; not used when use_dpo=True
  use_kl_in_reward: False
  use_dpo: True                   # Enable Online DPO path in ray_trainer
  gamma: 1.0
  lam: 1.0

# ---------------------------------------------------------------------------
# Reward: BatchRewardManager + LLM Judge
# ---------------------------------------------------------------------------
reward:
  reward_manager:
    source: register
    name: llm_judge               # Batch-level LLM judge scoring
  custom_reward_function:
    path: verl.utils.reward_score.llm_judge_reward
    name: compute_score
  # Enable batch judge mode: per-trajectory scoring is deferred, and all
  # trajectories are sent to the judge together for relative comparison.
  use_batch_judge: True

# ---------------------------------------------------------------------------
# Trainer
# ---------------------------------------------------------------------------
trainer:
  critic_warmup: 0
  logger: '["console","wandb"]'
  n_gpus_per_node: 8
  nnodes: 1
  total_epochs: 15
  save_freq: 20
  test_freq: 10
  val_before_train: True
