hydra:
  searchpath:
    - file://verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

# Data config: prompts extracted by extract_prompts.py (same as reject_sampling)
data:
  max_prompt_length: 4096
  max_response_length: 8192
  train_batch_size: 32                 # Smaller than reject_sampling (64) due to API rate limits
  return_raw_chat: True
  filter_overlong_prompts: True
  truncation: error

# Actor + Rollout + Ref config
# Key differences from reject_sampling:
#   - hybrid_engine: True (actually train the actor)
#   - lr > 0 (DPO update)
#   - policy_loss.loss_mode: dpo
#   - use_kl_loss: False (DPO loss already includes the ref term)
actor_rollout_ref:
  hybrid_engine: True                  # Train actor + rollout in the same worker
  rollout:
    name: vllm
    mode: async
    multi_turn:
      enable: True
      max_assistant_turns: 15          # Agent tasks need more turns than math
      max_parallel_calls: 1
      max_tool_response_length: 2048
      tool_response_truncate_side: middle
      format: hermes
    n: 8                               # 8 samples per prompt; best_vs_worst -> 1 pair
    temperature: 0.7                   # Moderate temperature for diversity
    top_p: 0.95
    gpu_memory_utilization: 0.85
    over_sample_rate: 0.1
    multi_stage_wake_up: True
  model:
    path: Qwen/Qwen3-4B
    use_remove_padding: True
    enable_gradient_checkpointing: True
  actor:
    optim:
      lr: 1e-6                         # DPO learning rate (smaller than SFT)
      weight_decay: 0.1
    use_kl_loss: False                 # DPO loss already has ref term; no extra KL
    policy_loss:
      loss_mode: dpo                   # Use the DPO loss registered in core_algos
      dpo_beta: 0.1                    # DPO temperature β
    ppo_mini_batch_size: 32
    ppo_micro_batch_size_per_gpu: 4
    use_dynamic_bsz: True
    grad_clip: 1
    fsdp_config:
      param_offload: False             # Keep on GPU since we train
      optimizer_offload: False
  ref:
    log_prob_micro_batch_size_per_gpu: 8
    fsdp_config:
      param_offload: True              # Ref is inference-only, offload to save memory

# Critic: disabled (DPO does not use a value function)
critic:
  enable: False

# Algorithm: DPO mode (skips advantage computation and critic update)
algorithm:
  adv_estimator: grpo                  # Placeholder; not used when use_dpo=True
  use_kl_in_reward: False
  use_dpo: True                        # Enable Online DPO branch in ray_trainer.fit()
  gamma: 1.0
  lam: 1.0

# Reward: DeepSeek API judge (DPO_MODE=1 skips trajectory saving)
reward:
  reward_manager:
    source: register
    name: naive
  custom_reward_function:
    path: Rl_Specilist.agent.reject_sampling.reward.judge_reward
    name: compute_score

# Trainer: multi-epoch DPO training with checkpointing
trainer:
  critic_warmup: 0
  logger: '["console","wandb"]'
  n_gpus_per_node: 8
  nnodes: 1
  total_epochs: 15                     # Iterate over the data multiple times
  save_freq: 20                        # Save checkpoint every 20 steps
  test_freq: 10                        # Validate every 10 steps
  val_before_train: True
