# Sandbox tool configuration for Online DPO
# =============================================================================
#
# Provides bash, read_file, write_file, and submit_answer tools that execute
# in an isolated workspace directory (one per trajectory).
#
# Loaded via:  actor_rollout_ref.rollout.multi_turn.tool_config_path=<this file>
#
# The workspace is shared across tools within a trajectory.
# At the end of the trajectory the workspace is cleaned up.
#
# Backend (config.backend):
#   subprocess (default) — run commands directly on host
#   docker               — run commands in a container (future)
#   agent-env            — uni-agent AgentEnv (future)

tools:
  # ---- Bash ----
  - class_name: "Rl_Specilist.agent.online_dpo.tools.sandbox_tools.SandboxBashTool"
    config:
      type: native
      backend: subprocess
      timeout: 30
      max_output: 4000
      workspace_base: /tmp/verl_sandbox
    tool_schema:
      type: "function"
      function:
        name: "bash"
        description: >-
          Execute a bash command in the workspace. Returns stdout+stderr.
          Use for file operations, running scripts, installing packages, etc.
        parameters:
          type: "object"
          properties:
            command:
              type: "string"
              description: "The bash command to execute."
          required: ["command"]

  # ---- Read file ----
  - class_name: "Rl_Specilist.agent.online_dpo.tools.sandbox_tools.SandboxReadTool"
    config:
      type: native
      max_lines: 500
      workspace_base: /tmp/verl_sandbox
    tool_schema:
      type: "function"
      function:
        name: "read_file"
        description: >-
          Read the contents of a file in the workspace. Returns the file text
          with line numbers. Use this to inspect previously written files or
          check command output.
        parameters:
          type: "object"
          properties:
            file_path:
              type: "string"
              description: "Path to the file to read, relative to the workspace root."
          required: ["file_path"]

  # ---- Write file ----
  - class_name: "Rl_Specilist.agent.online_dpo.tools.sandbox_tools.SandboxWriteTool"
    config:
      type: native
      max_size: 100000
      workspace_base: /tmp/verl_sandbox
    tool_schema:
      type: "function"
      function:
        name: "write_file"
        description: >-
          Write content to a file in the workspace. Creates parent directories
          if needed. Overwrites existing files.
        parameters:
          type: "object"
          properties:
            file_path:
              type: "string"
              description: "Path to the file to write, relative to the workspace root."
            content:
              type: "string"
              description: "Content to write to the file."
          required: ["file_path", "content"]

  # ---- Submit answer ----
  - class_name: "Rl_Specilist.agent.online_dpo.tools.sandbox_tools.SandboxSubmitTool"
    config:
      type: native
    tool_schema:
      type: "function"
      function:
        name: "submit_answer"
        description: >-
          Submit your final answer. Call this when you have completed the task.
          This signals the end of the trajectory.
        parameters:
          type: "object"
          properties:
            answer:
              type: "string"
              description: "Your final answer or result."
          required: ["answer"]
